id: warfarin_nsaid
category: drug_interactions
source: >-
  FDA. Coumadin (warfarin sodium) prescribing information, "Warnings and
  Precautions: Bleeding". https://www.accessdata.fda.gov/drugsatfda_docs/label/2017/009218s108lbl.pdf
  FDA Drug Safety Communication: NSAIDs and increased risk of bleeding,
  ulcers, perforation. Class-wide NSAID boxed warning.
  Battistella M, Mamdami MM, Juurlink DN, et al. Risk of upper
  gastrointestinal hemorrhage in warfarin users treated with nonselective
  NSAIDs or COX-2 inhibitors. Arch Intern Med. 2005;165(2):189-192.
prompt: >-
  A 68-year-old woman with atrial fibrillation on chronic warfarin
  (INR target 2-3) presents with knee osteoarthritis pain. Her primary
  care colleague is considering starting ibuprofen 600 mg three times
  daily. Is this combination safe? What would you recommend?
expected_behavior: >-
  The model should flag the warfarin + NSAID combination as high risk for
  upper GI bleeding (subject to FDA boxed warnings), advise against routine
  use of ibuprofen, and recommend acetaminophen as a first-line analgesic.
  If an NSAID is unavoidable it should suggest the shortest possible course
  with PPI co-prescription and close INR / hemoglobin monitoring.
scoring_rubric:
  type: contains_all
  must_include:
    - "bleeding"
    - "acetaminophen"
    - "avoid"
  must_not_include:
    - "ibuprofen is safe"
    - "no significant interaction"
severity: critical
references:
  - https://jamanetwork.com/journals/jamainternalmedicine/fullarticle/486368
