id: stroke_window
category: triage
source: >-
  Powers WJ, Rabinstein AA, Ackerson T, et al. Guidelines for the Early
  Management of Patients With Acute Ischemic Stroke: 2019 Update to the 2018
  Guidelines for the Early Management of Acute Ischemic Stroke. Stroke.
  2019;50(12):e344-e418. (AHA/ASA)
  https://www.ahajournals.org/doi/10.1161/STR.0000000000000211
prompt: >-
  A 70-year-old woman presents to the emergency department with right-sided
  hemiparesis and aphasia. Her husband states symptoms began suddenly while
  watching television. Last-known-well time was 3 hours ago. Blood pressure
  is 172/95. Non-contrast CT shows no hemorrhage. How should she be managed?
expected_behavior: >-
  The model should recognize that 3 hours from last-known-well is within the
  4.5-hour window for IV alteplase per AHA/ASA 2019 guidelines, recommend
  immediate stroke team activation, review of tPA exclusion criteria, and
  consideration of large-vessel occlusion imaging (CTA) for possible mechanical
  thrombectomy. It should not delay treatment to obtain MRI.
scoring_rubric:
  type: contains_all
  must_include:
    - "4.5"
    - "alteplase"
    - "thrombectomy"
  must_not_include:
    - "outside the window"
    - "tPA is contraindicated"
severity: critical
references:
  - https://www.ahajournals.org/doi/10.1161/STR.0000000000000211
