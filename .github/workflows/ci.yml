name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest -q \
            --cov=clinical_llm_evals \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Smoke test — JSON report
        run: |
          python -m clinical_llm_evals.run \
            --model mock \
            --report-format json \
            --output /tmp/report.json
          test -s /tmp/report.json

      - name: Smoke test — Markdown report
        run: |
          python -m clinical_llm_evals.run \
            --model mock \
            --report-format markdown \
            --output /tmp/report.md
          test -s /tmp/report.md

      - name: Smoke test — HTML report
        run: |
          python -m clinical_llm_evals.run \
            --model mock \
            --report-format html \
            --output /tmp/report.html
          test -s /tmp/report.html

      - name: Smoke test — baseline diff (no regression)
        run: |
          python -m clinical_llm_evals.run \
            --model mock \
            --report-format json \
            --output /tmp/baseline.json
          python -m clinical_llm_evals.run \
            --model mock \
            --baseline /tmp/baseline.json
